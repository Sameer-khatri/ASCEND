<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCEND // LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #e8e0d0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOP BAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            color: rgba(232, 224, 208, 0.4);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: rgba(232, 224, 208, 0.8);
        }

        .pillar-tag {
            font-size: 11px;
            letter-spacing: 2px;
            color: #c9a84c;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4a7c59;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 3px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* ── MESSAGES ── */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 78%;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.ai {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
        }

        .message-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.4;
        }

        .message.ai .message-label {
            color: #a0aec0;
        }

        .message.user .message-label {
            color: #c9a84c;
            text-align: right;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 300;
        }

        .message.ai .bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom-left-radius: 4px;
            color: #d4cfc8;
        }

        .message.user .bubble {
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-bottom-right-radius: 4px;
            color: #e8e0d0;
        }

        /* ── TYPING INDICATOR ── */
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            animation: fadeUp 0.3s ease;
        }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: typingDot 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* ── COMPLETION SCREEN ── */
        .completion {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px;
            animation: fadeUp 0.5s ease;
        }

        .completion.visible {
            display: flex;
        }

        .completion-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(74, 124, 89, 0.15);
            border: 1px solid rgba(74, 124, 89, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 22px;
        }

        .completion h2 {
            font-size: 22px;
            font-weight: 400;
            color: #e8e0d0;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .completion p {
            font-size: 14px;
            color: rgba(232, 224, 208, 0.45);
            line-height: 1.7;
            max-width: 320px;
            margin-bottom: 32px;
        }

        .state-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .state-1 {
            background: rgba(160, 174, 192, 0.1);
            color: #a0aec0;
            border: 1px solid rgba(160, 174, 192, 0.2);
        }

        .state-2 {
            background: rgba(237, 137, 54, 0.1);
            color: #ed8936;
            border: 1px solid rgba(237, 137, 54, 0.2);
        }

        .state-3 {
            background: rgba(245, 101, 101, 0.1);
            color: #f56565;
            border: 1px solid rgba(245, 101, 101, 0.2);
        }

        .state-4 {
            background: rgba(74, 124, 89, 0.1);
            color: #68d391;
            border: 1px solid rgba(74, 124, 89, 0.2);
        }

        .completion-actions {
            display: flex;
            gap: 12px;
        }

        .btn-home {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(232, 224, 208, 0.7);
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e8e0d0;
        }

        .btn-another {
            padding: 12px 28px;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.25);
            color: #c9a84c;
            border-radius: 8px;
            font-size: 13px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-another:hover {
            background: rgba(201, 168, 76, 0.18);
        }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 16px 28px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: rgba(201, 168, 76, 0.3);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e8e0d0;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 300;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
        }

        #user-input::placeholder {
            color: rgba(232, 224, 208, 0.25);
        }

        #send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: #c9a84c;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 16px;
        }

        #send-btn:hover {
            background: rgba(201, 168, 76, 0.25);
        }

        #send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .hint {
            font-size: 11px;
            color: rgba(232, 224, 208, 0.2);
            text-align: center;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="topbar-left">
            <a href="/" class="back-btn">← back</a>
            <span style="color:rgba(255,255,255,0.1)">|</span>
            <span class="pillar-tag" id="pillar-label">loading...</span>
        </div>
        <div class="status-dot" id="status-dot"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
        <!-- messages render here -->
    </div>

    <!-- COMPLETION SCREEN (hidden until done) -->
    <div class="completion" id="completion-screen">
        <div class="completion-icon">✦</div>
        <h2>That's logged.</h2>
        <p id="completion-msg">You sat with something real today. That's harder than it looks.</p>
        <div class="state-badge" id="state-badge"></div>
        <div class="completion-actions">
            <a href="/" class="btn-home">go home</a>
            <button class="btn-another" onclick="logAnother()">log another</button>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area" id="input-area">
        <div class="input-wrap">
            <textarea id="user-input" rows="1" placeholder="just say what happened..." onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button id="send-btn" onclick="sendMessage()">↑</button>
        </div>
        <p class="hint">press enter to send</p>
    </div>

    <script>
        // ── STATE ──
        const params = new URLSearchParams(window.location.search);
        let incidentId = params.get('incident_id');
        let pillar = params.get('pillar') || 'awareness';
        let firstNote = params.get('note') || '';
        let isStarted = false;
        let isComplete = false;

        // ── INIT ──
        document.getElementById('pillar-label').textContent = pillar;

        // If we came from Quick Log with a note, start immediately
        window.addEventListener('load', () => {
            if (firstNote && !incidentId) {
                // Show user's initial note as their first message
                addMessage('user', decodeURIComponent(firstNote));
                showTyping();
                startIncident(pillar, decodeURIComponent(firstNote));
            } else if (incidentId) {
                // Resuming existing incident — shouldn't normally happen in V2
                addMessage('ai', "Let's continue where we left off.");
            } else {
                // No note — prompt user to type
                addMessage('ai', "What happened?");
            }
        });

        // ── START INCIDENT ──
        async function startIncident(pillar, note) {
            try {
                const res = await fetch('/start_incident', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pillar, note })
                });
                const data = await res.json();
                removeTyping();
                incidentId = data.incident_id;
                isStarted = true;
                addMessage('ai', data.ai_question);
            } catch (err) {
                removeTyping();
                addMessage('ai', "Something went wrong. Try again.");
            }
        }

        // ── SEND MESSAGE ──
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || isComplete) return;

            input.value = '';
            autoResize(input);
            addMessage('user', text);
            showTyping();

            document.getElementById('send-btn').disabled = true;

            try {
                if (!isStarted) {
                    // First message — start the incident
                    await startIncident(pillar, text);
                    isStarted = true;
                } else {
                    // Continue conversation
                    const res = await fetch('/continue_incident', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            incident_id: incidentId,
                            message: text
                        })
                    });
                    const data = await res.json();
                    removeTyping();

                    if (data.complete) {
                        showCompletion(data.state_code);
                    } else {
                        addMessage('ai', data.ai_question);
                    }
                }
            } catch (err) {
                removeTyping();
                addMessage('ai', "Something went wrong. Try again.");
            }

            document.getElementById('send-btn').disabled = false;
        }

        // ── SHOW COMPLETION ──
        function showCompletion(stateCode) {
            isComplete = true;
            document.getElementById('status-dot').style.background = '#c9a84c';
            document.getElementById('status-dot').style.animation = 'none';

            const messages = {
                1: { text: "You didn't know. Now you do. That's the first step.", badge: "Unaware — needs education" },
                2: { text: "You were confused and pulling away. Sit with why.", badge: "Confused + avoiding" },
                3: { text: "You knew exactly what to do. You still didn't. That's the real work.", badge: "Aware — resisting" },
                4: { text: "You saw it and you moved. That's what growth looks like.", badge: "Growth state" }
            };

            const msg = messages[stateCode] || messages[1];

            setTimeout(() => {
                document.getElementById('chat-area').style.display = 'none';
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('completion-msg').textContent = msg.text;

                const badge = document.getElementById('state-badge');
                badge.textContent = msg.badge;
                badge.className = `state-badge state-${stateCode}`;

                document.getElementById('completion-screen').classList.add('visible');
            }, 800);
        }

        // ── LOG ANOTHER ──
        function logAnother() {
            window.location.href = '/';
        }

        // ── UI HELPERS ──
        function addMessage(role, text) {
            const chat = document.getElementById('chat-area');
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'ai' ? 'shadow' : 'you';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const chat = document.getElementById('chat-area');
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
    </script>
</body>

</html>
