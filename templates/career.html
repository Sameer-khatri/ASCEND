<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCEND // CAREER</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="career-wrapper">

    <div class="checkin-header">
        <a href="/" class="back">← ASCEND</a>
        <h2 class="checkin-title">CAREER ENGINE // SHADOW</h2>
        <p class="checkin-sub">Target: 15 LPA — 18 months remaining</p>
    </div>

    <!-- STATS -->
    <div class="career-stats">
        <div class="stat-row">
            <span class="stat-label">DSA PROBLEMS SOLVED</span>
            <span class="stat-value" id="dsa-count">0</span>
        </div>
        <div class="career-bar">
            <div class="career-bar-fill" id="dsa-bar" style="width:0%"></div>
        </div>
        <div class="stat-row">
            <span class="stat-label">DAYS CODED THIS MONTH</span>
            <span class="stat-value" id="code-count">0</span>
        </div>
        <div class="career-bar">
            <div class="career-bar-fill" id="code-bar" style="width:0%"></div>
        </div>
        <div class="stat-row">
            <span class="stat-label">CURRENT STREAK</span>
            <span class="stat-value" id="career-streak">0 DAYS</span>
        </div>
    </div>

    <!-- TODAY'S MISSION -->
    <div class="mission-box" id="mission-box">
        <p class="mission-loading">Loading today's mission...</p>
    </div>

    <!-- REPORT BACK -->
    <div class="career-log" id="report-section" style="display:none">

        <div class="pillar-block">
            <h3>DSA — DID YOU ATTEMPT IT?</h3>
            <p class="pillar-hint" id="dsa-hint"></p>
            <select id="dsa-status">
                <option value="solved">Solved it</option>
                <option value="partial">Partially solved</option>
                <option value="stuck">Got stuck</option>
                <option value="skipped">Skipped</option>
            </select>
            <textarea id="dsa-notes" placeholder="What did you try? Where did you get stuck?" style="margin-top:10px"></textarea>
        </div>

        <div class="pillar-block">
            <h3>LEARN — DID YOU STUDY IT?</h3>
            <p class="pillar-hint" id="learn-hint"></p>
            <select id="learn-status">
                <option value="done">Understood it</option>
                <option value="partial">Partially understood</option>
                <option value="skipped">Skipped</option>
            </select>
            <textarea id="learn-notes" placeholder="What specifically did you understand or not understand?" style="margin-top:10px"></textarea>
        </div>

        <div class="pillar-block">
            <h3>BUILD — DID YOU CODE TODAY?</h3>
            <p class="pillar-hint" id="build-hint"></p>
            <select id="build-status">
                <option value="done">Yes — built something</option>
                <option value="partial">Started but incomplete</option>
                <option value="skipped">No</option>
            </select>
            <textarea id="build-notes" placeholder="What did you build or work on?" style="margin-top:10px"></textarea>
        </div>

        <button class="submit-btn" onclick="submitCareer()">
            SUBMIT // GET TOMORROW'S MISSION
        </button>

        <div class="ascend-response" id="career-response" style="display:none">
            <h3>ASCEND SAYS //</h3>
            <p id="career-response-text"></p>
        </div>

    </div>

</div>

<script>
// Load today's mission on page load
async function loadMission() {
    const response = await fetch('/get_mission');
    const data = await response.json();
    
    const box = document.getElementById('mission-box');
    box.innerHTML = `
        <div class="mission-header">TODAY'S MISSION //</div>
        <div class="mission-item">
            <span class="mission-label">DSA //</span>
            <span class="mission-task">${data.dsa}</span>
            <a href="${data.dsa_link}" target="_blank" class="mission-link">OPEN →</a>
        </div>
        <div class="mission-item">
            <span class="mission-label">LEARN //</span>
            <span class="mission-task">${data.learn}</span>
            <a href="${data.learn_link}" target="_blank" class="mission-link">OPEN →</a>
        </div>
        <div class="mission-item">
            <span class="mission-label">BUILD //</span>
            <span class="mission-task">${data.build}</span>
        </div>
    `;
    
    document.getElementById('dsa-hint').innerText = data.dsa;
    document.getElementById('learn-hint').innerText = data.learn;
    document.getElementById('build-hint').innerText = data.build;
    document.getElementById('report-section').style.display = 'block';
}

async function submitCareer() {
    const payload = {
        dsa_status: document.getElementById('dsa-status').value,
        dsa_notes: document.getElementById('dsa-notes').value,
        learn_status: document.getElementById('learn-status').value,
        learn_notes: document.getElementById('learn-notes').value,
        build_status: document.getElementById('build-status').value,
        build_notes: document.getElementById('build-notes').value,
    };

    document.getElementById('career-response').style.display = 'block';
    document.getElementById('career-response-text').innerText = 'ASCEND is generating tomorrow\'s mission...';

    const response = await fetch('/career_submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    document.getElementById('career-response-text').innerText = data.feedback;
}

loadMission();
</script>

</body>
</html>
